<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="customer-style.css">
</head>
<body>
    <div class="container">
        <h1>Kenanga Money Changer</h1>
        <p class="subtitle">Currency Converter</p>
        
        <div class="transaction-type">
            <button id="buyBtn" class="type-btn active">We Buy</button>
            <button id="sellBtn" class="type-btn">We Sell</button>
        </div>

        <div class="converter">
            <div class="input-group">
                <label>Amount:</label>
                <input type="number" id="amount" value="1" min="0" step="0.01">
            </div>

            <div class="input-group">
                <label>Currency:</label>
                <select id="currency"></select>
            </div>

            <div class="result">
                <div id="resultDisplay">0.00 IDR</div>
            </div>
        </div>

        <div id="rateInfo" class="rate-info"></div>

        <button id="confirmBtn" class="confirm-btn">
            <span>📱</span>
            <span>Confirm Rate via WhatsApp</span>
        </button>
    </div>

    <script src="customer-script.js"></script>
</body>
</html>
